<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horários de Ônibus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F4EF;
      --surface: #FFFFFF;
      --border: #E2DDD6;
      --text: #1C1A17;
      --muted: #5A544E;
      --accent: #B5600A;
      --accent-bg: #FDF0E4;
      --accent-dk: #7A3D04;
      --green: #16A34A;
      --green-bg: #DCFCE7;
      --radius: 12px;
      --shadow: 0 4px 18px rgba(48,33,10,.06);
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; }
    header .subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .btn-back {
      text-decoration: none; color: var(--muted); font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      transition: all .2s; background: none; cursor: pointer; font-family: inherit;
    }
    .btn-back:hover { background: var(--bg); color: var(--text); }

    main { max-width: 980px; margin: 0 auto; padding: 36px 20px 60px; }

    /* ── Smart widget: dois cards lado a lado ── */
    .smart-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    .smart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .smart-card.going    { border-left: 4px solid var(--accent); }
    .smart-card.returning { border-left: 4px solid var(--green); }
    .smart-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
    }
    .smart-time {
      font-family: 'Lora', serif; font-size: 32px; font-weight: 600;
      color: var(--accent-dk); line-height: 1;
    }
    .smart-time.green { color: var(--green); }
    .countdown {
      font-size: 12px; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
    }
    .status-dot.go  { background: var(--accent); }
    .status-dot.ret { background: var(--green); }

    /* ── Section title ── */
    .section-title {
      font-family: 'Lora', serif; font-size: 16px; font-weight: 600;
      color: var(--accent-dk); margin-bottom: 16px;
    }

    /* ── Two-column schedule ── */
    .bus-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .bus-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .bus-panel-header {
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .panel-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--accent-bg); border: 1px solid #E8C898;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .panel-icon svg { width: 17px; height: 17px; fill: none; stroke: var(--accent-dk); stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .panel-icon.green-icon { background: var(--green-bg); border-color: #86EFAC; }
    .panel-icon.green-icon svg { stroke: var(--green); }
    .panel-title { font-weight: 600; font-size: 14px; color: var(--text); }

    .bus-panel-body { padding: 16px 20px 20px; }

    /* ── Period headers ── */
    .time-section { margin-bottom: 14px; }
    .time-section:last-child { margin-bottom: 0; }
    .period-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.09em; color: var(--muted);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .period-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Time pills ── */
    .times-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .time-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      position: relative;
      transition: opacity .15s;
    }
    .time-pill.past { opacity: 0.6; background: var(--bg); }
    .time-pill.next-go {
      background: var(--accent); border-color: var(--accent); color: white;
      box-shadow: 0 2px 10px rgba(181,96,10,.35);
      transform: scale(1.06);
    }
    .time-pill.next-ret {
      background: var(--green); border-color: var(--green); color: white;
      box-shadow: 0 2px 10px rgba(22,163,74,.3);
      transform: scale(1.06);
    }
    .pill-tag {
      font-size: 9px; font-weight: 700; padding: 1px 4px;
      border-radius: 4px; text-transform: uppercase;
      background: rgba(0,0,0,.08); letter-spacing: 0.04em;
    }
    .time-pill.next-go .pill-tag,
    .time-pill.next-ret .pill-tag { background: rgba(255,255,255,.25); }
    .now-arrow {
      position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
      font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 1px 5px; border-radius: 4px; white-space: nowrap; pointer-events: none; color: white;
    }
    .now-arrow.go  { background: var(--accent); }
    .now-arrow.ret { background: var(--green); }

    /* ── Legend ── */
    .legend-card {
      margin-top: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 20px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .legend-heading {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
    }
    .legend-items { display: flex; gap: 16px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; }
    .legend-dot {
      width: 26px; height: 16px; border-radius: 4px;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center;
    }
    .legend-dot.jl  { background: #E0F2FE; color: #0369A1; }
    .legend-dot.fc  { background: #FDE8D8; color: var(--accent-dk); }
    .legend-dot.fcv { background: #FCE7F3; color: #831843; }

    footer { text-align: center; padding: 40px 20px 20px; font-size: 12px; color: var(--muted); }

    @media (max-width: 680px) {
      header { padding: 14px 16px; }
      main { padding: 24px 12px 48px; }
      .smart-row { grid-template-columns: 1fr; }
      .bus-columns { grid-template-columns: 1fr; }
      .smart-time { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Horários de Ônibus</h1>
      <div class="subtitle">Linha Terminal ↔ Shopping</div>
    </div>
    <a href="index.html" class="btn-back">← Voltar</a>
  </header>

  <main>

    <!-- Dois smart cards simultâneos -->
    <div class="smart-row">
      <div class="smart-card going">
        <div>
          <div class="smart-label">
            <span class="status-dot go"></span>
            Terminal → Shopping
          </div>
          <div class="smart-time" id="smart-time-go">--:--</div>
        </div>
        <div class="countdown" id="smart-count-go">—</div>
      </div>
      <div class="smart-card returning">
        <div>
          <div class="smart-label">
            <span class="status-dot ret"></span>
            Shopping → Terminal
          </div>
          <div class="smart-time green" id="smart-time-ret">--:--</div>
        </div>
        <div class="countdown" id="smart-count-ret">—</div>
      </div>
    </div>

    <div class="section-title">Tabela de Horários</div>

    <div class="bus-columns">

      <div class="bus-panel">
        <div class="bus-panel-header">
          <div class="panel-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h10M7 11h5"/></svg>
          </div>
          <div class="panel-title">Terminal → Shopping</div>
        </div>
        <div class="bus-panel-body" id="panel-go"></div>
      </div>

      <div class="bus-panel">
        <div class="bus-panel-header">
          <div class="panel-icon green-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h10M12 11h5"/></svg>
          </div>
          <div class="panel-title">Shopping → Terminal</div>
        </div>
        <div class="bus-panel-body" id="panel-ret"></div>
      </div>

    </div>

    <div class="legend-card">
      <div class="legend-heading">Legenda</div>
      <div class="legend-items">
        <div class="legend-item"><div class="legend-dot jl">JL</div>Residencial Lupo</div>
        <div class="legend-item"><div class="legend-dot fc">FC</div>Fábrica de Cueca</div>
        <div class="legend-item"><div class="legend-dot fcv">VOLVO</div>FC com veículo Volvo</div>
      </div>
    </div>

  </main>

  

  <script>
    const BUSES = {
      go: [
        { t:'05:34', tag:'JL' }, { t:'05:59', tag:'JL' }, { t:'06:24', tag:'FC VOLVO' },
        { t:'06:49', tag:'JL' }, { t:'07:14', tag:'JL' }, { t:'07:44', tag:'JL' },
        { t:'08:19', tag:'JL' }, { t:'08:39', tag:'JL' }, { t:'08:59', tag:null },
        { t:'09:31', tag:null }, { t:'10:03', tag:null }, { t:'10:34', tag:null },
        { t:'11:06', tag:null }, { t:'11:38', tag:null }, { t:'12:10', tag:null },
        { t:'12:42', tag:null }, { t:'13:14', tag:null }, { t:'13:46', tag:null },
        { t:'14:18', tag:null }, { t:'14:50', tag:null }, { t:'15:22', tag:null },
        { t:'15:54', tag:null }, { t:'16:27', tag:null }, { t:'17:17', tag:null },
        { t:'17:42', tag:null }, { t:'18:07', tag:null }, { t:'18:37', tag:null },
        { t:'19:02', tag:null }, { t:'19:37', tag:null }, { t:'20:12', tag:null },
        { t:'20:47', tag:null }, { t:'21:22', tag:null }, { t:'21:57', tag:null },
        { t:'22:34', tag:null }, { t:'23:14', tag:'FC' },
      ],
      ret: [
        { t:'05:34', tag:null }, { t:'05:59', tag:null }, { t:'06:24', tag:null },
        { t:'06:49', tag:'FC VOLVO' }, { t:'07:14', tag:null }, { t:'07:39', tag:null },
        { t:'08:09', tag:null }, { t:'08:44', tag:null }, { t:'09:04', tag:null },
        { t:'09:24', tag:null }, { t:'09:56', tag:null }, { t:'10:28', tag:null },
        { t:'10:57', tag:null }, { t:'11:29', tag:null }, { t:'12:01', tag:null },
        { t:'12:33', tag:null }, { t:'13:05', tag:null }, { t:'13:37', tag:null },
        { t:'14:09', tag:null }, { t:'14:41', tag:null }, { t:'15:13', tag:null },
        { t:'15:33', tag:null }, { t:'16:03', tag:null }, { t:'16:28', tag:null },
        { t:'16:52', tag:null }, { t:'17:42', tag:null }, { t:'18:12', tag:null },
        { t:'18:47', tag:null }, { t:'19:27', tag:null }, { t:'20:02', tag:null },
        { t:'20:37', tag:null }, { t:'21:12', tag:null }, { t:'21:47', tag:null },
        { t:'22:22', tag:null }, { t:'22:54', tag:null }, { t:'23:34', tag:'FC' },
      ]
    };

    // Pré-calcula os minutos de cada ônibus para otimizar comparações
    for (const dir in BUSES) {
      BUSES[dir].forEach(b => b.m = toMins(b.t));
    }

    const PERIODS = [
      { label: 'Manhã',  min: 0,      max: 11*60+59 },
      { label: 'Tarde',  min: 12*60,  max: 17*60+59 },
      { label: 'Noite',  min: 18*60,  max: 24*60    },
    ];

    const TAG_CLASSES = { 'JL': 'jl', 'FC VOLVO': 'fcv', 'FC': 'fc' };

    // Cache de elementos do DOM
    const DOM = {
      go: {
        panel: document.getElementById('panel-go'),
        time: document.getElementById('smart-time-go'),
        count: document.getElementById('smart-count-go')
      },
      ret: {
        panel: document.getElementById('panel-ret'),
        time: document.getElementById('smart-time-ret'),
        count: document.getElementById('smart-count-ret')
      }
    };

    function toMins(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function fmtCountdown(mins) {
      if (mins < 1) return 'agora';
      if (mins < 60) return `em ${mins} min`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return m === 0 ? `em ${h}h` : `em ${h}h ${m}min`;
    }

    function renderPanel(dir, nowMins, nextBus) {
      let html = '';
      for (const period of PERIODS) {
        const buses = BUSES[dir].filter(b => b.m >= period.min && b.m <= period.max);
        if (!buses.length) continue;

        html += `<div class="time-section"><div class="period-label">${period.label}</div><div class="times-grid">`;
        buses.forEach(bus => {
          const isPast = bus.m <= nowMins;
          const isNext = nextBus && bus.t === nextBus.t;
          const cls = `time-pill ${isPast ? 'past' : ''} ${isNext ? 'next-' + dir : ''}`;
          const tagHtml = bus.tag ? `<span class="pill-tag ${TAG_CLASSES[bus.tag] || ''}">${bus.tag}</span>` : '';
          const arrowHtml = isNext ? `<span class="now-arrow ${dir}">próximo</span>` : '';
          html += `<div class="${cls}">${arrowHtml}${bus.t}${tagHtml}</div>`;
        });
        html += `</div></div>`;
      }
      DOM[dir].panel.innerHTML = html;
    }

    function updateSmartCard(dir, next, nowMins) {
      const d = DOM[dir];
      if (!next) {
        d.time.textContent = '——';
        d.count.textContent = '—';
      } else {
        d.time.textContent  = next.t;
        d.count.textContent = fmtCountdown(next.m - nowMins);
      }
    }

    function refresh() {
      const now = new Date();
      const nowMins = now.getHours() * 60 + now.getMinutes();

      ['go', 'ret'].forEach(dir => {
        const nextBus = BUSES[dir].find(b => b.m > nowMins) || null;
        renderPanel(dir, nowMins, nextBus);
        updateSmartCard(dir, nextBus, nowMins);
      });
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
