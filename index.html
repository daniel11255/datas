<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Index</title>
    <style>
        :root {
            --primary-color: #1e90ff; /* Bright blue */
            --secondary-color: #6a5acd; /* Slate blue */
            --accent-color: #20b2aa; /* Light sea green */
            --background-color: linear-gradient(135deg, #1e90ff, #6a5acd);
            --card-background: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        body {
            background: var(--background-color);
            font-family: 'Arial', sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            transition: background 0.5s ease;
        }

        .card {
            background: var(--card-background);
            border-radius: 15px;
            box-shadow: 0 4px 30px var(--shadow-color);
            padding: 20px;
            margin: 20px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }

        button {
            background-color: var(--primary-color);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            padding: 10px 20px;
            font-size: 16px;
            transition: background-color 0.3s ease, transform 0.2s;
        }

        button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to the Modern Index Page</h1>
        <p>This is a modern design with gradients, vibrant colors, and smooth animations.</p>
        <button>Click Me!</button>
    </div>
</body>
</html>
